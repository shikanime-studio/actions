name: Backport Command
description: Backport pull request on a pull request head ref
inputs:
  github-token:
    default: ${{ github.token }}
    description: The GitHub Token
    required: false
  gpg-passphrase:
    default: ""
    description: GPG private key passphrase
    required: false
  gpg-private-key:
    default: ""
    description: GPG private key for signing commits
    required: false
  permissions:
    default: write,maintain,admin
    description: Permissions to require for the command
    required: false
  pull-request-url:
    default: ${{ github.event.issue.pull_request.html_url }}
    description: The Pull Request URL
    required: false
  reaction:
    default: rocket
    description: Reaction to add to the triggering comment
    required: false
  registry:
    default: nixpkgs
    description: Nix registry to use
    required: false
  sign-commits:
    default: "false"
    description: Set to true to sign commits with GPG
    required: false
  username:
    default: github-actions
    description: Username
    required: false
runs:
  using: composite
  steps:
    - id: command
      uses: github/command@v2
      with:
        allowed_contexts: pull_request
        command: .backport
        github_token: ${{ inputs.github-token }}
        permissions: ${{ inputs.permissions }}
        reaction: ${{ inputs.reaction }}
        skip_ci: true
    - id: checkout
      if: steps.command.outputs.continue == 'true'
      uses: shikanime-studio/actions/checkout@v9
      with:
        github-token: ${{ inputs.github-token }}
        gpg-passphrase: ${{ inputs.gpg-passphrase }}
        gpg-private-key: ${{ inputs.gpg-private-key }}
        pull-request-url: ${{ inputs.pull-request-url }}
        registry: ${{ inputs.registry }}
        sign-commits: ${{ inputs.sign-commits }}
        username: ${{ inputs.username }}
    - id: backport
      if: steps.command.outputs.continue == 'true'
      continue-on-error: true
      uses: shikanime-studio/actions/backport@v9
      with:
        github-token: ${{ inputs.github-token }}
        method: ${{ steps.checkout.outputs.method }}
        pull-request-url: ${{ inputs.pull-request-url }}
        registry: ${{ inputs.registry }}
        target-branch: ${{ steps.command.outputs.params }}
        username: ${{ inputs.username }}
    - if: steps.backport.outcome == 'failure'
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        PR_URL="${{ inputs.pull-request-url }}"
        TARGET_BRANCH="${{ steps.command.outputs.params }}"

        IFS=' ' read -r SCHEME HOST OWNER REPO <<<"$(
          jq -Rr 'capture("^(?<scheme>https?)://(?<host>[^/]+)/(?<owner>[^/]+)/(?<repo>[^/]+)/pull/(?<number>[0-9]+)") | "\(.scheme) \(.host) \(.owner) \(.repo)"' \
            <<<"$PR_URL"
        )"

        RUN_URL="$SCHEME://$HOST/$OWNER/$REPO/actions/runs/${{ github.run_id }}"

        gh pr comment "$PR_URL" --body "$(
          cat <<EOF
        ### ⚠️ Cannot proceed with operation

        - targetBranch: \`$TARGET_BRANCH\`
        - logs: $RUN_URL

        > Backport failed
        EOF
        )"
        exit 1
      shell: bash
