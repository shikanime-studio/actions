name: JavaScript Integration
description: Run a list of package manager stages via corepack
inputs:
  recursive:
    default: "false"
    description: If true, runs in workspace mode with --recursive
    required: false
  stages:
    default: '["check","lint","build"]'
    description: JSON array of stages to run in order
    required: false
runs:
  using: composite
  steps:
    - run: corepack pnpm install --frozen-lockfile
      shell: bash
    - env:
        INPUT_RECURSIVE: ${{ inputs.recursive }}
        INPUT_STAGES: ${{ inputs.stages }}
      run: |
        STAGES="$(printf '%s' "$INPUT_STAGES" | jq -r '.[]')"

        args=()
        if [ "$INPUT_RECURSIVE" = "true" ]; then
          args+=(--recursive)
        fi

        while IFS= read -r stage; do
          corepack pnpm "${args[@]}" run --if-present "$stage"
        done <<< "$STAGES"
      shell: bash
