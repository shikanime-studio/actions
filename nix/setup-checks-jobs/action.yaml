name: Setup Checks Jobs
description: Generate matrix for Nix checks on Linux systems
inputs:
  systems:
    default: |
      {
        "ubuntu-latest": ["x86_64-linux"],
        "ubuntu-24.04-arm": ["aarch64-linux", "armv6l-linux", "armv7l-linux"]
      }
    description: Runner to systems mapping
    required: false
outputs:
  continue:
    description: Whether any Linux checks/packages exist
    value: ${{ steps.matrix.outputs.continue }}
  matrix:
    description: JSON array of matrix entries
    value: ${{ steps.matrix.outputs.matrix }}
runs:
  using: composite
  steps:
    - id: matrix
      run: |
        MATRIX="[]"
        CONTINUE="false"

        if ! JSON="$(nix flake show --json --all-systems --accept-flake-config --no-pure-eval 2>/dev/null)"; then
          echo "::warning::nix flake show failed, skipping checks matrix"
        elif [ -z "$JSON" ] || [ "$JSON" = "null" ]; then
          echo "::warning::nix flake show returned empty output"
        else
          RESULT="$(
            jq -c '
              .checks as $root
              | ($root | keys) as $available
              | (env.INPUT_SYSTEMS | fromjson) as $systems
              | ($systems | to_entries)
              | map(. as $pair
                    | ($pair.value
                       | map(select(. as $s | $available | index($s)))
                       | map({system: ., runner: $pair.key})
                      )
                  )
              | flatten
            ' <<< "$JSON" 2>/dev/null
          )"
          if [ -n "$RESULT" ] && [ "$RESULT" != "null" ]; then
            MATRIX="$RESULT"
            CONTINUE=$([ "$MATRIX" = "[]" ] && echo "false" || echo "true")
          fi
        fi

        echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
        echo "continue=$CONTINUE" >> "$GITHUB_OUTPUT"
      shell: bash
      env:
        INPUT_SYSTEMS: ${{ inputs.systems }}
