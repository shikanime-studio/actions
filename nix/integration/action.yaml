name: Nix Integration
description: Build a flake target and upload NixOS image artifacts when present
inputs:
  name:
    description: Package name under packages.<system>.<name> to build
    required: true
  system:
    default: ""
    description: Nix system (used when building from package name)
    required: false
runs:
  using: composite
  steps:
    - env:
        INPUT_NAME: ${{ inputs.name }}
        INPUT_SYSTEM: ${{ inputs.system }}
      id: target
      run: |
        if [ -z "$INPUT_SYSTEM" ]; then
          FLAKE_URL=".#packages.$INPUT_NAME"
          NAME="$INPUT_NAME"
        else
          FLAKE_URL=".#packages.$INPUT_SYSTEM.$INPUT_NAME"
          NAME="$INPUT_SYSTEM-$INPUT_NAME"
        fi

        echo "flake_url=$FLAKE_URL" >> "$GITHUB_OUTPUT"
        echo "name=$NAME" >> "$GITHUB_OUTPUT"
      shell: bash
    - env:
        INPUT_FLAKE_URL: ${{ steps.target.outputs.flake_url }}
      run: nix build --accept-flake-config --no-pure-eval "$INPUT_FLAKE_URL"
      shell: bash
    - id: nixos
      env:
        INPUT_NAME: ${{ inputs.name }}
        INPUT_SYSTEM: ${{ inputs.system }}
      run: |
        SYSTEM="$INPUT_SYSTEM"
        if [ -z "$SYSTEM" ]; then
          SYSTEM="$(nix eval --raw --impure --expr builtins.currentSystem)"
        fi
        if [ -z "$SYSTEM" ]; then
          echo "::error::Unable to determine Nix system (inputs.system empty and builtins.currentSystem returned empty)"
          exit 1
        fi

        JSON="$(nix flake show --json --all-systems --accept-flake-config --no-pure-eval)"

        FOUND="$(
          jq -r \
            --arg system "$SYSTEM" \
            --arg name "$INPUT_NAME" \
            '
              (.packages[$system] // {})
              | to_entries
              | map(.value.name)
              | map(select(startswith("nixos-image-")))
              | index($name)
              | if . == null then "false" else "true" end
            ' <<<"$JSON"
        )"

        echo "found=$FOUND" >> "$GITHUB_OUTPUT"
      shell: bash
    - id: artifact
      if: ${{ steps.nixos.outputs.found == 'true' }}
      run: |
        MATCHES=()
        while IFS= read -r -d '' file; do
          MATCHES+=("$file")
        done < <(
          find -L result -type f \( \
            -name '*.iso' -o \
            -name '*.img' -o \
            -name '*.img.*' -o \
            -name '*.qcow2' -o \
            -name '*.raw' -o \
            -name '*.vhd' -o \
            -name '*.vhdx' -o \
            -name '*.vmdk' -o \
            -name '*.ova' -o \
            -name '*.tar.gz' -o \
            -name '*.tar.xz' -o \
            -name '*.tar.zst' \
          \) -print0
        )

        if [ ${#MATCHES[@]} -eq 0 ]; then
          echo "::error::NixOS image detected but no image artifacts found under ./result"
          exit 1
        fi

        if [ ${#MATCHES[@]} -ne 1 ]; then
          echo "::error::NixOS image detected but expected exactly 1 artifact file under ./result, found ${#MATCHES[@]}"
          printf '%s\n' "${MATCHES[@]}" >&2
          exit 1
        fi

        src="${MATCHES[0]}"
        echo "path=$src" >> "$GITHUB_OUTPUT"
      shell: bash
    - if: >-
        ${{ steps.nixos.outputs.found == 'true' }}
      uses: actions/upload-artifact@v7
      with:
        archive: false
        if-no-files-found: error
        name: ${{ steps.target.outputs.name }}
        path: ${{ steps.artifact.outputs.path }}
