name: Nix Integration
description: Build a flake target and push NixOS image artifacts to a container registry when present
inputs:
  container-registry:
    default: ghcr.io
    description: Container registry host
    required: false
  container-username:
    default: ${{ github.actor }}
    description: Container registry username
    required: false
  container-tag:
    default: ${{ github.sha }}
    description: Container tag to push artifacts to
    required: false
  container-token:
    default: ${{ github.token }}
    description: "Container registry token/password. For ghcr.io, ensure the token has packages: write."
    required: false
  name:
    description: Package name under packages.<system>.<name> to build
    required: true
  registry:
    default: nixpkgs
    description: Nix registry to use
    required: false
  repo:
    default: ${{ github.repository }}
    description: Repository path as owner/repo (used when computing container reference)
    required: false
  system:
    default: ""
    description: Nix system (used when building from package name)
    required: false
runs:
  using: composite
  steps:
    - env:
        INPUT_NAME: ${{ inputs.name }}
        INPUT_SYSTEM: ${{ inputs.system }}
      id: target
      run: |
        if [ -z "$INPUT_SYSTEM" ]; then
          FLAKE_URL=".#packages.$INPUT_NAME"
          NAME="$INPUT_NAME"
        else
          FLAKE_URL=".#packages.$INPUT_SYSTEM.$INPUT_NAME"
          NAME="$INPUT_SYSTEM-$INPUT_NAME"
        fi

        echo "flake_url=$FLAKE_URL" >> "$GITHUB_OUTPUT"
        echo "name=$NAME" >> "$GITHUB_OUTPUT"
      shell: bash
    - env:
        INPUT_FLAKE_URL: ${{ steps.target.outputs.flake_url }}
      run: nix build --accept-flake-config --no-pure-eval "$INPUT_FLAKE_URL"
      shell: bash
    - id: nixos
      env:
        INPUT_NAME: ${{ inputs.name }}
        INPUT_SYSTEM: ${{ inputs.system }}
      run: |
        SYSTEM="$INPUT_SYSTEM"
        if [ -z "$SYSTEM" ]; then
          SYSTEM="$(nix eval --raw --impure --expr builtins.currentSystem)"
        fi
        if [ -z "$SYSTEM" ]; then
          echo "::error::Unable to determine Nix system (inputs.system empty and builtins.currentSystem returned empty)"
          exit 1
        fi

        JSON="$(nix flake show --json --all-systems --accept-flake-config --no-pure-eval)"

        FOUND="$(
          jq -r \
            --arg system "$SYSTEM" \
            --arg name "$INPUT_NAME" \
            '
              (.packages[$system][$name] // {})
              | .name // ""
              | startswith("nixos-")
            ' <<<"$JSON"
        )"

        echo "found=$FOUND" >> "$GITHUB_OUTPUT"
      shell: bash
    - if: ${{ steps.nixos.outputs.found == 'true' }}
      env:
        INPUT_CONTAINER_REGISTRY: ${{ inputs.container-registry }}
        INPUT_CONTAINER_TOKEN: ${{ inputs.container-token }}
        INPUT_CONTAINER_USERNAME: ${{ inputs.container-username }}
        INPUT_REGISTRY: ${{ inputs.registry }}
      run: |
        echo "$INPUT_CONTAINER_TOKEN" \
          | nix run "$INPUT_REGISTRY#oras" -- login "$INPUT_CONTAINER_REGISTRY" \
            --username "$INPUT_CONTAINER_USERNAME" \
            --password-stdin
      shell: bash
    - if: ${{ steps.nixos.outputs.found == 'true' }}
      env:
        INPUT_CONTAINER_REGISTRY: ${{ inputs.container-registry }}
        INPUT_CONTAINER_TAG: ${{ inputs.container-tag }}
        INPUT_REGISTRY: ${{ inputs.registry }}
        INPUT_REPO: ${{ inputs.repo }}
        INPUT_TARGET_NAME: ${{ steps.target.outputs.name }}
      run: |
        CONTAINER_REF="$INPUT_CONTAINER_REGISTRY/$INPUT_REPO/$INPUT_TARGET_NAME:$INPUT_CONTAINER_TAG"
        nix run "$INPUT_REGISTRY#oras" -- push "$CONTAINER_REF" \
          --artifact-type application/vnd.shikanime-studio.nixos.images.v1 \
          ./result/:application/vnd.shikanime-studio.nixos.images.layer.v1+tar
      shell: bash
