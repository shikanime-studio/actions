name: Setup Packages Jobs
description: Generate matrix for Nix packages on Linux systems
inputs:
  systems:
    default: |
      {
        "ubuntu-latest": ["x86_64-linux"],
        "ubuntu-24.04-arm": ["aarch64-linux", "armv6l-linux", "armv7l-linux"]
      }
    description: Runner to systems mapping
    required: false
  excludes:
    default: '["devenv-up", "devenv-test"]'
    description: Packages to exclude
    required: false
outputs:
  continue:
    description: Whether any Linux packages exist
    value: ${{ steps.matrix.outputs.continue }}
  matrix:
    description: JSON array of matrix entries
    value: ${{ steps.matrix.outputs.matrix }}
runs:
  using: composite
  steps:
    - id: matrix
      run: |
        MATRIX="[]"
        CONTINUE="false"

        if ! JSON="$(nix flake show --json --all-systems --accept-flake-config --no-pure-eval 2>/dev/null)"; then
          echo "::warning::nix flake show failed, skipping packages matrix"
        elif [ -z "$JSON" ] || [ "$JSON" = "null" ]; then
          echo "::warning::nix flake show returned empty output"
        else
          RESULT="$(
            jq -c '
              .packages
              | to_entries
              | (env.INPUT_SYSTEMS | fromjson) as $systems
              | ($systems | to_entries) as $pairs
              | ($pairs
                 | reduce .[] as $p ({}; . + ($p.value | reduce .[] as $s ({}; . + {($s): $p.key})))
                ) as $sys2runner
              | map(select(.key as $s | $sys2runner | has($s)))
              | reduce .[] as $entry ([]; . += (
                    ( ($entry.value | keys)
                      | (env.INPUT_EXCLUDES | fromjson) as $excludes
                      | map(select(. as $name | $excludes | index($name) | not))
                    )
                    | map({
                        system: $entry.key,
                        runner: ($sys2runner[$entry.key] // "ubuntu-latest"),
                        name: .
                      })
                  ))
            ' <<< "$JSON" 2>/dev/null
          )"
          if [ -n "$RESULT" ] && [ "$RESULT" != "null" ]; then
            MATRIX="$RESULT"
            CONTINUE=$([ "$MATRIX" = "[]" ] && echo "false" || echo "true")
          fi
        fi

        echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
        echo "continue=$CONTINUE" >> "$GITHUB_OUTPUT"
      shell: bash
      env:
        INPUT_EXCLUDES: ${{ inputs.excludes }}
        INPUT_SYSTEMS: ${{ inputs.systems }}
