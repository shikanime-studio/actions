name: Checkout
description: Checkout repository with method-appropriate defaults
inputs:
  github-token:
    default: ${{ github.token }}
    description: The GitHub Token
    required: false
  pull-request-url:
    default: ""
    description: The Pull Request URL
    required: false
  registry:
    default: nixpkgs
    description: Nix registry to use
    required: false
  email:
    default: github-actions[bot]@users.noreply.github.com
    description: Email for sapling identity
    required: false
  fullname:
    default: github-actions[bot]
    description: Full name for sapling identity
    required: false
  github-url:
    default: github.com
    description: GitHub host for ghstack
    required: false
  gpg-passphrase:
    default: ""
    description: GPG private key passphrase
    required: false
  gpg-private-key:
    default: ""
    description: GPG private key for signing commits
    required: false
  sign-commits:
    default: "false"
    description: Set to true to sign commits with GPG
    required: false
  username:
    default: github-actions
    description: Username for ghstack and jj push bookmark template
    required: false
outputs:
  base-ref:
    description: The base ref name of the pull request (when pull-request-url is set)
    value: ${{ steps.stack.outputs.base-ref }}
  head-ref:
    description: The head ref name of the pull request (when pull-request-url is set)
    value: ${{ steps.stack.outputs.head-ref }}
  method:
    description: The resolved method used to create the pull request (ghstack, sapling-pull-request, github-pull-request)
    value: ${{ steps.stack.outputs.method }}
  parent-pull-request-url:
    description: The parent pull request URL if part of a stack (when available)
    value: ${{ steps.stack.outputs.parent-pull-request-url }}
runs:
  using: composite
  steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
        persist-credentials: false
        token: ${{ inputs.github-token }}
    - env:
        GH_TOKEN: ${{ inputs.github-token }}
        PULL_REQUEST_URL: ${{ inputs.pull-request-url }}
      id: stack
      run: |
        if [[ -z "$PULL_REQUEST_URL" ]]; then
          echo "method=github-pull-request" >> "$GITHUB_OUTPUT"
          echo "head-ref=" >> "$GITHUB_OUTPUT"
          echo "base-ref=" >> "$GITHUB_OUTPUT"
          echo "parent-pull-request-url=" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        JSON="$(gh pr view "$PULL_REQUEST_URL" --json headRefName,baseRefName,body)"
        BRANCH="$(printf '%s' "$JSON" | jq -r .headRefName)"
        BASE="$(printf '%s' "$JSON" | jq -r .baseRefName)"
        BODY="$(printf '%s' "$JSON" | jq -r .body)"

        if [[ "$BRANCH" =~ ^gh/[^/]+/[0-9]+/head$ ]]; then
          METHOD="ghstack"
        elif [[ "$BODY" == *"Stack from [ghstack]"* ]]; then
          METHOD="ghstack"
        elif [[ "$BRANCH" =~ ^pr[0-9]+$ ]]; then
          METHOD="sapling-pull-request"
        elif [[ "$BODY" == *"Stack created with https://sapling-scm.com"* ]]; then
          METHOD="sapling-pull-request"
        else
          METHOD="github-pull-request"
        fi

        echo "head-ref=$BRANCH" >> "$GITHUB_OUTPUT"
        echo "base-ref=$BASE" >> "$GITHUB_OUTPUT"
        echo "method=$METHOD" >> "$GITHUB_OUTPUT"

        PARENT_PR=""

        if [[ "$METHOD" == "ghstack" || "$METHOD" == "sapling-pull-request" ]]; then
          if printf '%s\n' "$BODY" | grep -q "__->__"; then
            STACK_LINES="$(printf '%s\n' "$BODY" | grep "^[*] " || true)"
            PARENT_LINE="$(printf '%s\n' "$STACK_LINES" | grep -A 1 "__->__" || true)"
            PARENT_LINE="$(printf '%s\n' "$PARENT_LINE" | tail -n 1)"

            if [[ -n "${PARENT_LINE:-}" && "$PARENT_LINE" != *"__->__"* ]]; then
              PARENT_PR="$(printf '%s\n' "$PARENT_LINE" | sed -n 's/.*#\([0-9]*\).*/\1/p')"
            fi
          fi
        fi

        if [[ -n "${PARENT_PR:-}" ]]; then
          PARENT_PR_URL="$(gh pr view "$PARENT_PR" --json url | jq -r .url)"
          echo "parent-pull-request-url=$PARENT_PR_URL" >> "$GITHUB_OUTPUT"
        else
          echo "parent-pull-request-url=" >> "$GITHUB_OUTPUT"
        fi
      shell: bash
    - env:
        EMAIL: ${{ inputs.email }}
        FULLNAME: ${{ inputs.fullname }}
        REGISTRY: ${{ inputs.registry }}
      if: steps.stack.outputs.method == 'sapling-pull-request'
      run: |
        nix run "$REGISTRY#sapling" -- config \
          --local ui.username "$FULLNAME <$EMAIL>"
      shell: bash
    - env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        GITHUB_URL: ${{ inputs.github-url }}
        USERNAME: ${{ inputs.username }}
      if: steps.stack.outputs.method == 'ghstack'
      run: |
        git config --global advice.detachedHead false
        GHSTACKRC="${GHSTACKRC:-$HOME/.ghstackrc}"
        cat > "$GHSTACKRC" <<EOF
        [ghstack]
        github_url = $GITHUB_URL
        github_oauth = $GITHUB_TOKEN
        github_username = $USERNAME
        EOF
      shell: bash
    - env:
        PULL_REQUEST_URL: ${{ inputs.pull-request-url }}
        REGISTRY: ${{ inputs.registry }}
      if: inputs.pull-request-url != '' && steps.stack.outputs.method == 'ghstack'
      run: |
        nix run "$REGISTRY#ghstack" -- checkout "$PULL_REQUEST_URL"
      shell: bash
    - env:
        PULL_REQUEST_URL: ${{ inputs.pull-request-url }}
        REGISTRY: ${{ inputs.registry }}
      if: inputs.pull-request-url != '' && steps.stack.outputs.method == 'sapling-pull-request'
      run: |
        nix run "$REGISTRY#sapling" -- pr pull \
          --goto \
          "$PULL_REQUEST_URL"
      shell: bash
    - env:
        GH_TOKEN: ${{ inputs.github-token }}
        PULL_REQUEST_URL: ${{ inputs.pull-request-url }}
      if: inputs.pull-request-url != '' && steps.stack.outputs.method == 'github-pull-request'
      run: gh pr checkout "$PULL_REQUEST_URL"
      shell: bash
    - env:
        GPG_PASSPHRASE: ${{ inputs.gpg-passphrase }}
        GPG_PRIVATE_KEY: ${{ inputs.gpg-private-key }}
      id: gpg
      if: ${{ inputs.sign-commits == 'true' }}
      run: |
        KEY_FILE="$(mktemp)"
        cat <<'EOF' > "$KEY_FILE"
        $GPG_PRIVATE_KEY
        EOF

        if [[ -n "$GPG_PASSPHRASE" ]]; then
          gpg --batch --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" --import "$KEY_FILE"
        else
          gpg --batch --import "$KEY_FILE"
        fi

        KEY_ID="$(gpg --show-keys --with-colons "$KEY_FILE" | awk -F: '$1 == "sec" {print $5; exit}')"
        echo "keyid=$KEY_ID" >> "$GITHUB_OUTPUT"

        git config --global user.signingkey "$KEY_ID"
        git config --global commit.gpgsign true

        if [[ -n "$GPG_PASSPHRASE" ]]; then
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          echo "allow-preset-passphrase" >> ~/.gnupg/gpg-agent.conf

          KEYGRIP="$(gpg --with-colons --with-keygrip --list-secret-keys "$KEY_ID" | awk -F: '$1 == "grp" {print $10; exit}')"
          gpg-connect-agent reloadagent /bye

          echo "$GPG_PASSPHRASE" | /usr/lib/gnupg/gpg-preset-passphrase --preset "$KEYGRIP"
        fi

        rm -f "$KEY_FILE"
      shell: bash
    - env:
        REGISTRY: ${{ inputs.registry }}
        KEYID: ${{ steps.gpg.outputs.keyid }}
      if: ${{ steps.stack.outputs.method == 'sapling-pull-request' && inputs.sign-commits == 'true' }}
      run: |
        nix run "$REGISTRY#sapling" -- config \
          --local gpg.key "$KEYID" \
          --local commit.gpgsign true
      shell: bash
    - env:
        REGISTRY: ${{ inputs.registry }}
        KEYID: ${{ steps.gpg.outputs.keyid }}
      if: ${{ steps.stack.outputs.method == 'github-pull-request' && inputs.sign-commits == 'true' }}
      run: |
        nix run "$REGISTRY#jujutsu" -- config set \
          --repo signing.backend gpg
        nix run "$REGISTRY#jujutsu" -- config set \
          --repo signing.sign-all true
        nix run "$REGISTRY#jujutsu" -- config set \
          --repo signing.key "$KEYID"
      shell: bash
