name: Checkout
description: Checkout repository with method-appropriate defaults
inputs:
  github-token:
    default: ${{ github.token }}
    description: The GitHub Token
    required: false
  method:
    default: github-pull-request
    description: One of 'ghstack', 'sapling-pull-request', or 'github-pull-request'
    required: false
  pull-request-url:
    default: ""
    description: The Pull Request URL
    required: false
  registry:
    default: nixpkgs
    description: Nix registry to use
    required: false
  email:
    default: github-actions[bot]@users.noreply.github.com
    description: Email for sapling identity
    required: false
  fullname:
    default: github-actions[bot]
    description: Full name for sapling identity
    required: false
  github-url:
    default: github.com
    description: GitHub host for ghstack
    required: false
  gpg-passphrase:
    default: ""
    description: GPG private key passphrase
    required: false
  gpg-private-key:
    default: ""
    description: GPG private key for signing commits
    required: false
  sign-commits:
    default: "false"
    description: Set to true to sign commits with GPG
    required: false
  username:
    default: github-actions
    description: Username for ghstack and jj push bookmark template
    required: false
runs:
  using: composite
  steps:
    - if: inputs.method == 'sapling-pull-request'
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        token: ${{ inputs.github-token }}
    - if: inputs.method != 'sapling-pull-request'
      uses: actions/checkout@v6
      with:
        token: ${{ inputs.github-token }}
    - env:
        EMAIL: ${{ inputs.email }}
        FULLNAME: ${{ inputs.fullname }}
        REGISTRY: ${{ inputs.registry }}
      if: inputs.method == 'sapling-pull-request'
      run: |
        nix run "$REGISTRY#sapling" -- config \
          --local ui.username "$FULLNAME <$EMAIL>"
      shell: bash
    - env:
        GH_TOKEN: ${{ inputs.github-token }}
        GITHUB_URL: ${{ inputs.github-url }}
        USERNAME: ${{ inputs.username }}
      if: inputs.method == 'ghstack'
      run: |
        git config --global advice.detachedHead false
        GHSTACKRC="${GHSTACKRC:-$HOME/.ghstackrc}"
        cat > "$GHSTACKRC" <<EOF
        [ghstack]
        github_url = $GITHUB_URL
        github_oauth = $GH_TOKEN
        github_username = $USERNAME
        EOF
      shell: bash
    - env:
        PR_URL: ${{ inputs.pull-request-url }}
        REGISTRY: ${{ inputs.registry }}
      if: inputs.pull-request-url != '' && inputs.method == 'ghstack'
      run: |
        nix run "$REGISTRY#ghstack" -- checkout "$PR_URL"
      shell: bash
    - env:
        PR_URL: ${{ inputs.pull-request-url }}
        REGISTRY: ${{ inputs.registry }}
      if: inputs.pull-request-url != '' && inputs.method == 'sapling-pull-request'
      run: |
        nix run "$REGISTRY#sapling" -- pr pull \
          --goto \
          "$PR_URL"
      shell: bash
    - env:
        GH_TOKEN: ${{ inputs.github-token }}
        PR_URL: ${{ inputs.pull-request-url }}
      if: inputs.pull-request-url != '' && inputs.method == 'github-pull-request'
      run: gh pr checkout "$PR_URL"
      shell: bash
    - id: importGPG
      if: ${{ inputs.sign-commits == 'true' }}
      uses: crazy-max/ghaction-import-gpg@v7
      with:
        git_commit_gpgsign: true
        git_user_signingkey: true
        gpg_private_key: ${{ inputs.gpg-private-key }}
        passphrase: ${{ inputs.gpg-passphrase }}
    - env:
        GPG_KEY_ID: ${{ steps.importGPG.outputs.keyid }}
        REGISTRY: ${{ inputs.registry }}
      if: ${{ inputs.method == 'sapling-pull-request' && inputs.sign-commits == 'true' }}
      run: |
        nix run "$REGISTRY#sapling" -- config \
          --local gpg.key "$GPG_KEY_ID" \
          --local commit.gpgsign true
      shell: bash
    - env:
        GPG_KEY_ID: ${{ steps.importGPG.outputs.keyid }}
        REGISTRY: ${{ inputs.registry }}
      if: ${{ inputs.method == 'github-pull-request' && inputs.sign-commits == 'true' }}
      run: |
        nix run "$REGISTRY#jujutsu" -- config set \
          --repo signing.backend gpg
        nix run "$REGISTRY#jujutsu" -- config set \
          --repo signing.sign-all true
        nix run "$REGISTRY#jujutsu" -- config set \
          --repo signing.key "$GPG_KEY_ID"
      shell: bash
