---
name: Run
description: Trigger a workflow dispatch
inputs:
  github-token:
    default: ${{ github.token }}
    description: The GitHub Token
    required: false
  ref:
    default: ${{ github.ref }}
    description: Git ref to run the workflow on
    required: false
  workflow:
    description: Workflow name or path to run (must support workflow_dispatch)
    required: true
runs:
  using: composite
  steps:
    - env:
        GH_TOKEN: ${{ inputs.github-token }}
        INPUT_REF: ${{ inputs.ref }}
        INPUT_WORKFLOW: ${{ inputs.workflow }}
      run: |
        gh workflow run "$INPUT_WORKFLOW" \
          --ref "$INPUT_REF" \
          --repo "${{ github.repository }}"
      shell: bash
