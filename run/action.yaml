name: Run
description: Trigger a workflow dispatch
inputs:
  github-token:
    default: ${{ github.token }}
    description: The GitHub Token
    required: false
  ref:
    default: ${{ github.ref }}
    description: Git ref to run the workflow on
    required: false
  workflow:
    description: Workflow name or path to run (must support workflow_dispatch)
    required: true
runs:
  using: composite
  steps:
    - env:
        GH_REPO: ${{ github.repository }}
        GH_TOKEN: ${{ inputs.github-token }}
        REF: ${{ inputs.ref }}
        WORKFLOW: ${{ inputs.workflow }}
      run: |
        if [ -z "$REF" ]; then
          echo "Error: ref not provided"
          exit 1
        fi
        gh workflow run "$WORKFLOW" \
          --ref "$REF" \
          --repo "$GH_REPO"
      shell: bash
