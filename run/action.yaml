name: Run
description: Trigger a workflow dispatch on a pull request head ref
inputs:
  github-token:
    default: ${{ github.token }}
    description: The GitHub Token
    required: false
  head-ref:
    default: ""
    description: Pull request head ref (required when invoking this action directly)
    required: false
  workflow:
    description: Workflow name or path to run (must support workflow_dispatch)
    required: true
runs:
  using: composite
  steps:
    - env:
        GH_REPO: ${{ github.repository }}
        GH_TOKEN: ${{ inputs.github-token }}
        REF: ${{ inputs.head-ref }}
        WORKFLOW: ${{ inputs.workflow }}
      run: |
        if [ -z "$REF" ]; then
          echo "Error: could not determine PR head ref"
          exit 1
        fi
        gh workflow run "$WORKFLOW" \
          --ref "$REF" \
          --repo "$GH_REPO"
      shell: bash
