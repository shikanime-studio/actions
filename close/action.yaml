name: Close
description: Close a pull request
inputs:
  github-token:
    default: ${{ github.token }}
    description: The GitHub Token
    required: false
  method:
    default: github-pull-request
    description: One of 'ghstack', 'sapling-pull-request', or 'github-pull-request' (required when invoking this action directly)
    required: false
  pull-request-url:
    default: ${{ github.event.pull_request.html_url || github.event.issue.pull_request.html_url }}
    description: The Pull Request URL
    required: false
  registry:
    default: nixpkgs
    description: Nix registry to use
    required: false
runs:
  using: composite
  steps:
    - if: inputs.method == 'ghstack'
      run: |
        nix run "${{ inputs.registry }}#ghstack" -- action \
          --close \
          "${{ inputs.pull-request-url }}"
      shell: bash
    - if: inputs.method == 'sapling-pull-request' || inputs.method == 'github-pull-request'
      run: GH_TOKEN="${{ inputs.github-token }}" gh pr close --delete-branch "${{ inputs.pull-request-url }}"
      shell: bash
