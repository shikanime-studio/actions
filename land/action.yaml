name: Land
description: Land a pull request
inputs:
  base:
    default: main
    description: The base branch to rebase onto
    required: false
  method:
    default: github-pull-request
    description: One of 'ghstack', 'sapling-pull-request', or 'github-pull-request' (required when invoking this action directly)
    required: false
  github-token:
    default: ${{ github.token }}
    description: The GitHub Token
    required: false
  pull-request-url:
    default: ${{ github.event.pull_request.html_url || github.event.issue.pull_request.html_url }}
    description: The Pull Request URL
    required: false
  registry:
    default: nixpkgs
    description: Nix registry to use
    required: false
runs:
  using: composite
  steps:
    - if: inputs.method == 'ghstack'
      run: nix run "${{ inputs.registry }}#ghstack" -- land "${{ inputs.pull-request-url }}"
      shell: bash
    - if: inputs.method == 'sapling-pull-request'
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        nix run "${{ inputs.registry }}#sapling" -- rebase --dest "${{ inputs.base }}"
        nix run "${{ inputs.registry }}#sapling" -- push --to "${{ inputs.base }}"
        DELETE_BRANCH=$(gh pr view "${{ inputs.pull-request-url }}" --json headRefName -q .headRefName)
        nix run "${{ inputs.registry }}#sapling" -- push --delete "$DELETE_BRANCH"
      shell: bash
    - if: inputs.method == 'github-pull-request'
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        gh pr merge \
          --rebase \
          --delete-branch \
          "${{ inputs.pull-request-url }}"
      shell: bash
