name: Land
description: Land a pull request
inputs:
  base:
    default: main
    description: The base branch to rebase onto
    required: false
  method:
    default: github-pull-request
    description: One of 'ghstack', 'sapling-pull-request', or 'github-pull-request' (required when invoking this action directly)
    required: false
  github-token:
    default: ${{ github.token }}
    description: The GitHub Token
    required: false
  pull-request-url:
    default: ${{ github.event.pull_request.html_url || github.event.issue.pull_request.html_url }}
    description: The Pull Request URL
    required: false
  registry:
    default: nixpkgs
    description: Nix registry to use
    required: false
runs:
  using: composite
  steps:
    - env:
        PR_URL: ${{ inputs.pull-request-url }}
        REGISTRY: ${{ inputs.registry }}
      if: inputs.method == 'ghstack'
      run: nix run "$REGISTRY#ghstack" -- land "$PR_URL"
      shell: bash
    - env:
        BASE: ${{ inputs.base }}
        GH_TOKEN: ${{ inputs.github-token }}
        PR_URL: ${{ inputs.pull-request-url }}
        REGISTRY: ${{ inputs.registry }}
      if: inputs.method == 'sapling-pull-request'
      run: |
        nix run "$REGISTRY#sapling" -- rebase --dest "$BASE"
        nix run "$REGISTRY#sapling" -- push --to "$BASE"
        DELETE_BRANCH=$(gh pr view "$PR_URL" --json headRefName -q .headRefName)
        nix run "$REGISTRY#sapling" -- push --delete $DELETE_BRANCH
      shell: bash
    - env:
        GH_TOKEN: ${{ inputs.github-token }}
        PR_URL: ${{ inputs.pull-request-url }}
      if: inputs.method == 'github-pull-request'
      run: |
        gh pr merge \
          --rebase \
          --delete-branch \
          "$PR_URL"
      shell: bash
