name: Release
description: Create or update a GitHub release and upload workflow artifacts
inputs:
  github-token:
    default: ${{ github.token }}
    description: The GitHub Token
    required: false
  ref:
    default: ${{ github.ref }}
    description: Git ref to build (branch, tag, or SHA)
    required: false
  repo:
    default: ${{ github.repository }}
    description: Target repository for the release (owner/repo)
    required: false
runs:
  using: composite
  steps:
    - if: ${{ startsWith(inputs.ref, 'refs/tags/') }}
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        INPUT_REF: ${{ inputs.ref }}
        INPUT_REPO: ${{ inputs.repo }}
      run: |
        REF_NAME="${INPUT_REF#refs/tags/}"
        gh release view "$REF_NAME" --repo "$INPUT_REPO" >/dev/null 2>&1 || \
          gh release create "$REF_NAME" \
            --repo "$INPUT_REPO"
      shell: bash
    - if: ${{ startsWith(inputs.ref, 'refs/tags/') }}
      env:
        INPUT_REF: ${{ inputs.ref }}
      run: |
        REF_NAME="${INPUT_REF#refs/tags/}"
        if [[ "$REF_NAME" =~ ^v?[0-9]+\.[0-9]+\.0$ ]]; then
          BRANCH_NAME="release-$(printf '%s' "$REF_NAME" | sed -e 's/^v//' -e 's/[.][^.]*$//')"
          git push origin "HEAD:refs/heads/$BRANCH_NAME"
        fi
      shell: bash
