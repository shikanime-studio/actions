name: Release
description: Create or update a GitHub release and upload workflow artifacts
inputs:
  github-token:
    default: ${{ github.token }}
    description: The GitHub Token
    required: false
  ref:
    default: ${{ github.ref_name || github.event.inputs.ref_name }}
    description: Tag name for the release
    required: false
  repo:
    default: ${{ github.repository }}
    description: Target repository for the release (owner/repo)
    required: false
runs:
  using: composite
  steps:
    - env:
        GH_TOKEN: ${{ inputs.github-token }}
        INPUT_REF: ${{ inputs.ref }}
        INPUT_REPO: ${{ inputs.repo }}
      run: |
        gh release view "$INPUT_REF" --repo "$INPUT_REPO" >/dev/null 2>&1 || \
          gh release create "$INPUT_REF" \
            --repo "$INPUT_REPO"
      shell: bash
    - continue-on-error: true
      uses: actions/download-artifact@v7
      with:
        merge-multiple: true
        path: artifacts
    - env:
        GH_TOKEN: ${{ inputs.github-token }}
        INPUT_REF: ${{ inputs.ref }}
        INPUT_REPO: ${{ inputs.repo }}
        ARTIFACTS_PATH: artifacts
      run: |
        while IFS= read -r -d '' file; do
          gh release upload "$INPUT_REF" "$file" --repo "$INPUT_REPO" --clobber
        done < <(find "$ARTIFACTS_PATH" -type f -print0)
      shell: bash
