name: Backport
description: Backport a pull request
inputs:
  github-token:
    default: ${{ github.token }}
    description: The GitHub Token
    required: false
  method:
    default: github-pull-request
    description: One of 'ghstack', 'sapling-pull-request', or 'github-pull-request' (required when invoking this action directly)
    required: false
  pull-request-url:
    default: ${{ github.event.pull_request.html_url || github.event.issue.pull_request.html_url }}
    description: The Pull Request URL
    required: false
  registry:
    default: nixpkgs
    description: Nix registry to use
    required: false
  target-branch:
    description: Target branch to backport onto
    required: true
  username:
    default: github-actions
    description: Username
    required: false
runs:
  using: composite
  steps:
    - if: inputs.method == 'ghstack'
      run: |
        nix run "${{ inputs.registry }}#ghstack" -- unlink "${{ inputs.pull-request-url }}"
        git fetch origin "${{ inputs.target-branch }}"
        git rebase "origin/${{ inputs.target-branch }}"
        nix run "${{ inputs.registry }}#ghstack" -- submit
      shell: bash
    - if: inputs.method == 'sapling-pull-request'
      run: |
        nix run "${{ inputs.registry }}#sapling" -- pr unlink
        nix run "${{ inputs.registry }}#sapling" -- rebase \
          --dest "${{ inputs.target-branch }}"
        nix run "${{ inputs.registry }}#sapling" -- pr submit
      shell: bash
    - continue-on-error: true
      if: inputs.method == 'github-pull-request'
      run: |
        nix run "${{ inputs.registry }}#jujutsu" -- git init
      shell: bash
    - if: inputs.method == 'github-pull-request'
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        nix run "${{ inputs.registry }}#jujutsu" -- git fetch --remote origin
        nix run "${{ inputs.registry }}#jujutsu" -- config set \
          --repo templates.git_push_bookmark \
          "\"${{ inputs.username }}/push-\" ++ change_id.short()"
        nix run "${{ inputs.registry }}#jujutsu" -- new "${{ inputs.target-branch }}@origin"
        nix run "${{ inputs.registry }}#jujutsu" -- rebase \
          -b @ \
          -o "${{ inputs.pull-request-url }}"
        nix run "${{ inputs.registry }}#jujutsu" -- git push --change @

        PUSH_BRANCH=$(nix run "${{ inputs.registry }}#jujutsu" -- log \
          --limit 1 \
          --template "{{bookmarks}}" \
          @)

        ORIG_TITLE=$(gh pr view "${{ inputs.pull-request-url }}" --json title -q .title)
        ORIG_BODY_FILE=<(gh pr view "${{ inputs.pull-request-url }}" --json body -q .body)

        gh pr create \
          --head "$PUSH_BRANCH" \
          --base "${{ inputs.target-branch }}" \
          --title "$ORIG_TITLE" \
          --body-file "$ORIG_BODY_FILE"
      shell: bash
