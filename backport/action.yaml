name: Backport
description: Backport pull request on a pull request head ref
inputs:
  app-slug:
    description: App slug from actions/create-github-app-token outputs (for bot identity)
    required: false
    default: ""
  email:
    description: Email (overrides app-slug derived email)
    required: false
    default: ""
  fullname:
    description: Full name (overrides app-slug derived name)
    required: false
    default: ""
  github-token:
    default: ${{ github.token }}
    description: The GitHub Token
    required: false
  pull-request-url:
    default: ${{ github.event.pull_request.html_url || github.event.issue.pull_request.html_url }}
    description: The Pull Request URL
    required: false
  registry:
    default: nixpkgs
    description: Nix registry to use
    required: false
  target-branch:
    description: The target branch to backport onto
    required: true
  username:
    default: github-actions
    description: Username
    required: false
outputs:
  method:
    description: The backport method used (ghstack|slpr|ghpr)
    value: ${{ steps.resolve.outputs.method }}
runs:
  using: composite
  steps:
    - id: resolve
      shell: bash
      run: |
        PR_URL="${{ inputs.pull-request-url }}"
        METHOD="${{ inputs.method }}"
        if [ -z "$METHOD" ] || [ "$METHOD" = "github-pull-request" ]; then
          BRANCH=$(gh pr view "$PR_URL" --json headRefName -q .headRefName 2>/dev/null || echo "")
          if [[ "$BRANCH" =~ ^gh/[^/]+/[0-9]+/head$ ]]; then
            METHOD="ghstack"
          elif [[ "$BRANCH" =~ ^pr[0-9]+$ ]]; then
            METHOD="sapling-pull-request"
          else
            METHOD="github-pull-request"
          fi
        fi
        echo "method=$METHOD" >> "$GITHUB_OUTPUT"
      env:
        GH_TOKEN: ${{ inputs.github-token }}
    - id: bot_identity
      shell: bash
      run: |
        APP_SLUG="${{ inputs.app-slug }}"
        if [ -n "$APP_SLUG" ]; then
          BOT_USER=$(gh api "/users/${APP_SLUG}%5Bbot%5D" --jq '.id' 2>/dev/null || echo "")
          if [ -n "$BOT_USER" ]; then
            echo "name=${APP_SLUG}[bot]" >> "$GITHUB_OUTPUT"
            echo "email=${BOT_USER}+${APP_SLUG}%5Bbot%5D@users.noreply.github.com" >> "$GITHUB_OUTPUT"
          fi
        fi
      if: inputs.app-slug != ''
      env:
        GH_TOKEN: ${{ inputs.github-token }}
    - id: git_config
      shell: bash
      run: |
        GIT_NAME="${{ inputs.fullname }}"
        GIT_EMAIL="${{ inputs.email }}"
        if [ -z "$GIT_NAME" ] && [ -n "${{ steps.bot_identity.outputs.name }}" ]; then
          GIT_NAME="${{ steps.bot_identity.outputs.name }}"
        fi
        if [ -z "$GIT_EMAIL" ] && [ -n "${{ steps.bot_identity.outputs.email }}" ]; then
          GIT_EMAIL="${{ steps.bot_identity.outputs.email }}"
        fi
        if [ -z "$GIT_NAME" ]; then GIT_NAME="github-actions[bot]"; fi
        if [ -z "$GIT_EMAIL" ]; then GIT_EMAIL="github-actions[bot]@users.noreply.github.com"; fi
        git config --global user.name "$GIT_NAME"
        git config --global user.email "$GIT_EMAIL"
    - id: importGPG
      if: ${{ inputs.sign-commits == 'true' }}
      uses: crazy-max/ghaction-import-gpg@v7
      with:
        git_commit_gpgsign: true
        git_user_signingkey: true
        gpg_private_key: ${{ inputs.gpg-private-key }}
        passphrase: ${{ inputs.gpg-passphrase }}
    - env:
        GH_TOKEN: ${{ inputs.github-token }}
        INPUT_PULL_REQUEST_URL: ${{ inputs.pull-request-url }}
        INPUT_REGISTRY: ${{ inputs.registry }}
        INPUT_TARGET_BRANCH: ${{ inputs.target-branch }}
        INPUT_USERNAME: ${{ inputs.username }}
      if: steps.resolve.outputs.method == 'ghstack'
      run: |
        GHSTACKRC="${GHSTACKRC:-$HOME/.ghstackrc}"
        cat > "$GHSTACKRC" <<EOF
        [ghstack]
        github_url = github.com
        github_oauth = $GH_TOKEN
        github_username = $INPUT_USERNAME
        EOF
        nix run "$INPUT_REGISTRY#ghstack" -- checkout "$INPUT_PULL_REQUEST_URL"
        nix run "$INPUT_REGISTRY#ghstack" -- unlink
        nix run "$INPUT_REGISTRY#ghstack" -- rebase --dest "$INPUT_TARGET_BRANCH"
        nix run "$INPUT_REGISTRY#ghstack" -- submit
      shell: bash
    - env:
        GH_TOKEN: ${{ inputs.github-token }}
        INPUT_PULL_REQUEST_URL: ${{ inputs.pull-request-url }}
        INPUT_REGISTRY: ${{ inputs.registry }}
        INPUT_TARGET_BRANCH: ${{ inputs.target-branch }}
      if: steps.resolve.outputs.method == 'sapling-pull-request'
      run: |
        nix run "$INPUT_REGISTRY#sapling" -- config --local ui.username "$(git config --global user.name) <$(git config --global user.email)>"
        nix run "$INPUT_REGISTRY#sapling" -- pr pull --goto "$INPUT_PULL_REQUEST_URL"
        nix run "$INPUT_REGISTRY#sapling" -- pr unlink
        nix run "$INPUT_REGISTRY#sapling" -- rebase --dest "$INPUT_TARGET_BRANCH"
        nix run "$INPUT_REGISTRY#sapling" -- pr submit
      shell: bash
    - id: backport_ghpr
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        INPUT_PULL_REQUEST_URL: ${{ inputs.pull-request-url }}
        INPUT_REGISTRY: ${{ inputs.registry }}
        INPUT_TARGET_BRANCH: ${{ inputs.target-branch }}
        KEY_ID: ${{ steps.importGPG.outputs.keyid }}
      if: steps.resolve.outputs.method == 'github-pull-request'
      run: |
        nix run "$INPUT_REGISTRY#jujutsu" -- config set --repo signing.backend gpg
        nix run "$INPUT_REGISTRY#jujutsu" -- config set --repo signing.sign-all true
        nix run "$INPUT_REGISTRY#jujutsu" -- config set --repo signing.key "$KEY_ID"
        nix run "$INPUT_REGISTRY#jujutsu" -- git init --colocate || true
        nix run "$INPUT_REGISTRY#jujutsu" -- git fetch --remote origin
        nix run "$INPUT_REGISTRY#jujutsu" -- config set --repo templates.git_push_bookmark "\"${USERNAME}/push-\" ++ change_id.short()"
        nix run "$INPUT_REGISTRY#jujutsu" -- new "$INPUT_TARGET_BRANCH@origin"
        nix run "$INPUT_REGISTRY#jujutsu" -- rebase -b @ -s "$(gh pr view "$INPUT_PULL_REQUEST_URL" --json headRefName -q .headRefName)@origin"
        nix run "$INPUT_REGISTRY#jujutsu" -- git push --change @

        PUSH_BRANCH=$(nix run "$INPUT_REGISTRY#jujutsu" -- log --limit 1 --template "{{bookmarks}}" @)
        ORIG_TITLE=$(gh pr view "$INPUT_PULL_REQUEST_URL" --json title -q .title)
        ORIG_BODY=$(gh pr view "$INPUT_PULL_REQUEST_URL" --json body -q .body)
        PR_NUMBER=$(gh pr view "$INPUT_PULL_REQUEST_URL" --json number -q .number)

        echo "push_branch=$PUSH_BRANCH" >> "$GITHUB_OUTPUT"
        echo "pr_title=$ORIG_TITLE" >> "$GITHUB_OUTPUT"
        echo "pr_body<<EOF" >> "$GITHUB_OUTPUT"
        echo "$ORIG_BODY" >> "$GITHUB_OUTPUT"
        echo "EOF" >> "$GITHUB_OUTPUT"
        echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
      shell: bash
    # Create the backport PR via octokit/request-action
    - uses: octokit/request-action@v2.x
      if: steps.resolve.outputs.method == 'github-pull-request'
      with:
        route: POST /repos/{owner}/{repo}/pulls
        owner: ${{ github.repository_owner }}
        repo: ${{ github.event.repository.name }}
        head: ${{ steps.backport_ghpr.outputs.push_branch }}
        base: ${{ inputs.target-branch }}
        title: "[Backport ${{ inputs.target-branch }}] ${{ steps.backport_ghpr.outputs.pr_title }}"
        body: |
          Backport of #${{ steps.backport_ghpr.outputs.pr_number }} to `${{ inputs.target-branch }}`.

          ${{ steps.backport_ghpr.outputs.pr_body }}
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
