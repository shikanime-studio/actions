name: update
author: Shikanime Studio
branding:
  color: gray-dark
  icon: globe
description: Update Nix flake and land changes
inputs:
  base:
    default: main
    description: The base branch to create or update against
    required: false
  commit-message:
    default: Update Flake
    description: Commit message
    required: false
  github-token:
    default: ${{ github.token }}
    description: The GitHub Token
    required: false
  method:
    default: github-pull-request
    description: Publication method, one of 'ghstack', 'sapling-pull-request' or 'github-pull-request'
    required: false
  registry:
    default: nixpkgs
    description: Nix registry to use
    required: false
  username:
    default: github-actions
    description: Username
runs:
  using: composite
  steps:
    - run: nix flake update --accept-flake-config
      shell: bash
    - env:
        INPUT_COMMIT_MESSAGE: ${{ inputs.commit-message }}
        INPUT_REGISTRY: ${{ inputs.registry }}
      run: |
        nix run "$INPUT_REGISTRY#sapling" -- ci \
          --message "$INPUT_COMMIT_MESSAGE"
      shell: bash
    - env:
        INPUT_REGISTRY: ${{ inputs.registry }}
      if: inputs.method == 'ghstack'
      run: nix run "$INPUT_REGISTRY#ghstack" -- submit
      shell: bash
    - env:
        GH_TOKEN: ${{ inputs.github-token }}
        INPUT_REGISTRY: ${{ inputs.registry }}
      if: inputs.method == 'sapling-pull-request'
      run: nix run "$INPUT_REGISTRY#sapling" -- pr submit
      shell: bash
    - env:
        GH_TOKEN: ${{ inputs.github-token }}
        INPUT_BASE: ${{ inputs.base }}
        INPUT_COMMIT_MESSAGE: ${{ inputs.commit-message }}
        INPUT_USERNAME: ${{ inputs.username }}
      if: inputs.method == 'github-pull-request'
      run: |
        git add flake.lock
        if git diff --cached --quiet; then
          echo "No changes to commit."
          exit 0
        fi

        git config user.email "${INPUT_USERNAME}@users.noreply.github.com"
        git config user.name "$INPUT_USERNAME"

        UPDATE_BRANCH="update/flake-$(date +%Y%m%d-%H%M%S)"
        git checkout -b "$UPDATE_BRANCH"
        git commit -m "$INPUT_COMMIT_MESSAGE"
        git push origin "$UPDATE_BRANCH"

        EXISTING=$(gh pr list \
          --head "$UPDATE_BRANCH" \
          --base "$INPUT_BASE" \
          --state open \
          --json number \
          -q '.[0].number' || true)

        if [ -z "$EXISTING" ]; then
          gh pr create \
            --head "$UPDATE_BRANCH" \
            --base "$INPUT_BASE" \
            --title "$INPUT_COMMIT_MESSAGE" \
            --body "Automated flake update."
        else
          echo "Existing open PR #$EXISTING for $UPDATE_BRANCH -> $INPUT_BASE, not creating a new one."
        fi
      shell: bash
