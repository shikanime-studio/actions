name: update
author: Shikanime Studio
branding:
  color: gray-dark
  icon: globe
description: Update Nix flake and land changes
inputs:
  base:
    default: main
    description: The base branch to create or update against
    required: false
  commit-message:
    default: Update Flake
    description: Commit message
    required: false
  email:
    default: github-actions[bot]@users.noreply.github.com
    description: Email
  fullname:
    default: github-actions[bot]
    description: Full name
    required: false
  github-token:
    default: ${{ github.token }}
    description: The GitHub Token
    required: false
  gpg-passphrase:
    default: ""
    description: GPG Private Key Passphrase for the GPG Private Key with which to sign the commits in the PR to be created
  gpg-private-key:
    default: ""
    description: GPG Private Key with which to sign the commits in the PR to be created
  method:
    default: github-pull-request
    description: Publication method, one of 'ghstack', 'sapling-pull-request' or 'github-pull-request'
    required: false
  registry:
    default: nixpkgs
    description: Nix registry to use
    required: false
  sign-commits:
    default: false
    description: Set to true if the action should sign the commit with GPG
  username:
    default: github-actions
    description: Username
runs:
  using: composite
  steps:
    - uses: shikanime-studio/actions/checkout@v8
      with:
        email: ${{ inputs.email }}
        fullname: ${{ inputs.fullname }}
        github-token: ${{ inputs.github-token }}
        github-url: github.com
        gpg-passphrase: ${{ inputs.gpg-passphrase }}
        gpg-private-key: ${{ inputs.gpg-private-key }}
        method: ${{ inputs.method }}
        registry: ${{ inputs.registry }}
        sign-commits: ${{ inputs.sign-commits }}
        username: ${{ inputs.username }}
    - env:
        REGISTRY: ${{ inputs.registry }}
      run: nix flake update --accept-flake-config
      shell: bash
    - env:
        COMMIT_MESSAGE: ${{ inputs.commit-message }}
        REGISTRY: ${{ inputs.registry }}
      run: |
        nix run "$REGISTRY#sapling" -- ci \
          --message "$COMMIT_MESSAGE"
      shell: bash
    - env:
        REGISTRY: ${{ inputs.registry }}
      if: inputs.method == 'ghstack'
      run: |
        nix run "$REGISTRY#ghstack" -- submit
      shell: bash
    - env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        REGISTRY: ${{ inputs.registry }}
      if: inputs.method == 'sapling-pull-request'
      run: |
        nix run "$REGISTRY#sapling" -- pr \
          submit
      shell: bash
    - env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        REGISTRY: ${{ inputs.registry }}
      continue-on-error: true
      if: inputs.method == 'github-pull-request'
      run: |
        nix run "$REGISTRY#jujutsu" -- git \
          init
      shell: bash
    - env:
        BASE: ${{ inputs.base }}
        COMMIT_MESSAGE: ${{ inputs.commit-message }}
        GITHUB_TOKEN: ${{ inputs.github-token }}
        REGISTRY: ${{ inputs.registry }}
        USERNAME: ${{ inputs.username }}
      if: inputs.method == 'github-pull-request'
      run: |
        nix run "$REGISTRY#jujutsu" -- git fetch \
          --remote origin

        nix run "$REGISTRY#jujutsu" -- config set \
          --repo templates.git_push_bookmark \
          "\"$USERNAME/push-\" ++ change_id.short()"

        nix run "$REGISTRY#jujutsu" -- git push \
          --change @

        PUSH_BRANCH=$(nix run "$REGISTRY#jujutsu" -- log \
          --limit 1 \
          --template "{{bookmarks}}" \
          @)

        EXISTING=$(gh pr list \
          --head "$PUSH_BRANCH" \
          --base "$BASE" \
          --state open \
          --json number \
          -q '.[0].number' || true)

        if [ -z "$EXISTING" ]; then
          gh pr create \
            --head "$PUSH_BRANCH" \
            --base "$BASE" \
            --title "$COMMIT_MESSAGE" \
            --body "Automated flake update."
        else
          echo "Existing open PR #$EXISTING for $PUSH_BRANCH -> $BASE, not creating a new one."
        fi
      shell: bash
