name: update
author: Shikanime Studio
branding:
  color: gray-dark
  icon: globe
description: Update Nix flake and land changes
inputs:
  base:
    default: main
    description: The base branch to create or update against
    required: false
  commit-message:
    default: Update Flake
    description: Commit message
    required: false
  github-token:
    default: ${{ github.token }}
    description: The GitHub Token
    required: false
  method:
    default: github-pull-request
    description: Publication method, one of 'ghstack', 'sapling-pull-request' or 'github-pull-request'
    required: false
  registry:
    default: nixpkgs
    description: Nix registry to use
    required: false
  username:
    default: github-actions
    description: Username
runs:
  using: composite
  steps:
    - env:
        REGISTRY: ${{ inputs.registry }}
      run: nix flake update --accept-flake-config
      shell: bash
    - env:
        COMMIT_MESSAGE: ${{ inputs.commit-message }}
        REGISTRY: ${{ inputs.registry }}
      run: |
        nix run "$REGISTRY#sapling" -- ci \
          --message "$COMMIT_MESSAGE"
      shell: bash
    - env:
        REGISTRY: ${{ inputs.registry }}
      if: inputs.method == 'ghstack'
      run: |
        nix run "$REGISTRY#ghstack" -- submit
      shell: bash
    - env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        REGISTRY: ${{ inputs.registry }}
      if: inputs.method == 'sapling-pull-request'
      run: |
        nix run "$REGISTRY#sapling" -- pr \
          submit
      shell: bash
    - env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        REGISTRY: ${{ inputs.registry }}
      continue-on-error: true
      if: inputs.method == 'github-pull-request'
      run: |
        nix run "$REGISTRY#jujutsu" -- git \
          init
      shell: bash
    - env:
        BASE: ${{ inputs.base }}
        COMMIT_MESSAGE: ${{ inputs.commit-message }}
        GITHUB_TOKEN: ${{ inputs.github-token }}
        REGISTRY: ${{ inputs.registry }}
        USERNAME: ${{ inputs.username }}
      if: inputs.method == 'github-pull-request'
      run: |
        nix run "$REGISTRY#jujutsu" -- git fetch \
          --remote origin

        nix run "$REGISTRY#jujutsu" -- config set \
          --repo templates.git_push_bookmark \
          "\"$USERNAME/push-\" ++ change_id.short()"

        nix run "$REGISTRY#jujutsu" -- git push \
          --change @

        PUSH_BRANCH=$(nix run "$REGISTRY#jujutsu" -- log \
          --limit 1 \
          --template "{{bookmarks}}" \
          @)

        EXISTING=$(gh pr list \
          --head "$PUSH_BRANCH" \
          --base "$BASE" \
          --state open \
          --json number \
          -q '.[0].number' || true)

        if [ -z "$EXISTING" ]; then
          gh pr create \
            --head "$PUSH_BRANCH" \
            --base "$BASE" \
            --title "$COMMIT_MESSAGE" \
            --body "Automated flake update."
        else
          echo "Existing open PR #$EXISTING for $PUSH_BRANCH -> $BASE, not creating a new one."
        fi
      shell: bash
