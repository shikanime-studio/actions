name: Rebase
description: Rebase a pull request
inputs:
  base:
    default: main
    description: The base branch to rebase onto
    required: false
  method:
    default: github-pull-request
    description: One of 'ghstack', 'sapling-pull-request', or 'github-pull-request' (required when invoking this action directly)
    required: false
  github-token:
    default: ${{ github.token }}
    description: The GitHub Token
    required: false
  pull-request-url:
    default: ${{ github.event.pull_request.html_url || github.event.issue.pull_request.html_url }}
    description: The Pull Request URL
    required: false
  registry:
    default: nixpkgs
    description: Nix registry to use
    required: false
runs:
  using: composite
  steps:
    - if: inputs.method == 'ghstack'
      run: |
        git fetch origin "${{ inputs.base }}"
        git rebase "origin/${{ inputs.base }}"
        nix run "${{ inputs.registry }}#ghstack" -- submit
      shell: bash
    - if: inputs.method == 'sapling-pull-request'
      run: |
        GH_TOKEN="${{ inputs.github-token }}" nix run "${{ inputs.registry }}#sapling" -- rebase --dest "${{ inputs.base }}"
        GH_TOKEN="${{ inputs.github-token }}" nix run "${{ inputs.registry }}#sapling" -- pr submit
      shell: bash
    - if: inputs.method == 'github-pull-request'
      run: |
        BASE_BRANCH=$(GH_TOKEN="${{ inputs.github-token }}" gh pr view "${{ inputs.pull-request-url }}" --json baseRefName -q .baseRefName)

        git fetch origin
        git rebase "origin/$BASE_BRANCH"
        git push --force-with-lease
      shell: bash
