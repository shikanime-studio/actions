name: Rebase
description: Rebase a pull request
inputs:
  base:
    default: main
    description: The base branch to rebase onto
    required: false
  method:
    default: github-pull-request
    description: One of 'ghstack', 'sapling-pull-request', or 'github-pull-request' (required when invoking this action directly)
    required: false
  github-token:
    default: ${{ github.token }}
    description: The GitHub Token
    required: false
  pull-request-url:
    default: ${{ github.event.pull_request.html_url || github.event.issue.pull_request.html_url }}
    description: The Pull Request URL
    required: false
  registry:
    default: nixpkgs
    description: Nix registry to use
    required: false
runs:
  using: composite
  steps:
    - env:
        INPUT_BASE: ${{ inputs.base }}
        INPUT_REGISTRY: ${{ inputs.registry }}
      if: inputs.method == 'ghstack'
      run: |
        git fetch origin "$INPUT_BASE"
        git rebase "origin/$INPUT_BASE"
        nix run "$INPUT_REGISTRY#ghstack" -- submit
      shell: bash
    - env:
        GH_TOKEN: ${{ inputs.github-token }}
        INPUT_BASE: ${{ inputs.base }}
        INPUT_REGISTRY: ${{ inputs.registry }}
      if: inputs.method == 'sapling-pull-request'
      run: |
        nix run "$INPUT_REGISTRY#sapling" -- rebase --dest "$INPUT_BASE"
        nix run "$INPUT_REGISTRY#sapling" -- pr submit
      shell: bash
    - env:
        GH_TOKEN: ${{ inputs.github-token }}
        INPUT_PULL_REQUEST_URL: ${{ inputs.pull-request-url }}
      if: inputs.method == 'github-pull-request'
      run: |
        BASE_BRANCH=$(gh pr view "$INPUT_PULL_REQUEST_URL" --json baseRefName -q .baseRefName)

        git fetch origin
        git rebase "origin/$BASE_BRANCH"
        git push --force-with-lease
      shell: bash
