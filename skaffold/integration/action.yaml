name: Skaffold Integration
description: Run Skaffold build and render, optionally with a profile
inputs:
  profile:
    description: Optional Skaffold profile name
    required: false
  platforms:
    default: '["linux/amd64","linux/arm64"]'
    description: JSON array of target platforms
    required: false
outputs:
  manifest:
    description: Rendered manifest YAML
    value: ${{ steps.skaffold.outputs.manifest }}
runs:
  using: composite
  steps:
    - id: skaffold
      run: |
        SKAFFOLD_PROFILE='${{ inputs.profile }}'
        PLATFORMS_JSON='${{ inputs.platforms }}'

        if [ -n "$PLATFORMS_JSON" ]; then
          PLATFORMS="$(echo "$PLATFORMS_JSON" | jq -r 'join(",")')"
          export SKAFFOLD_PLATFORM="$PLATFORMS"
        fi

        args=()
        if [ -n "$SKAFFOLD_PROFILE" ]; then
          args+=(-p "$SKAFFOLD_PROFILE")
        fi

        skaffold config set --global collect-metrics false
        skaffold build "${args[@]}"
        MANIFEST="$(skaffold render "${args[@]}")"
        {
          echo 'manifest<<EOF'
          echo "$MANIFEST"
          echo 'EOF'
        } >> "$GITHUB_OUTPUT"
      shell: bash
