name: Skaffold Integration
description: Run Skaffold build and render, optionally with a profile
inputs:
  profile:
    description: Optional Skaffold profile name
    required: false
  platforms:
    default: '["linux/amd64","linux/arm64"]'
    description: JSON array of target platforms (joined and passed to --platform)
    required: false
outputs:
  manifest:
    description: Rendered manifest YAML
    value: ${{ steps.skaffold.outputs.manifest }}
runs:
  using: composite
  steps:
    - id: skaffold
      env:
        PROFILE: ${{ inputs.profile }}
        PLATFORMS: ${{ inputs.platforms }}
      run: |
        args=()
        if [ -n "$PROFILE" ]; then
          args+=(--profile "$PROFILE")
        fi
        if [ -n "$PLATFORMS" ]; then
          if ! echo "$PLATFORMS" | jq -e 'type=="array" and all(. ; type=="string")' >/dev/null 2>&1; then
            echo "::error::Invalid platforms JSON: $PLATFORMS"
            exit 1
          fi
          PLATFORM_LIST="$(echo "$PLATFORMS" | jq -r 'join(",")')"
          if [ -n "$PLATFORM_LIST" ]; then
            args+=(--platform "$PLATFORM_LIST")
          fi
        fi

        skaffold config set --global collect-metrics false

        skaffold build "${args[@]}"
        {
          echo 'manifest<<EOF'
          skaffold render "${args[@]}"
          echo 'EOF'
        } >> "$GITHUB_OUTPUT"
      shell: bash
