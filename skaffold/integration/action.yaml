name: Skaffold Integration
description: Run Skaffold build and render, optionally with a profile
inputs:
  profile:
    description: Optional Skaffold profile name
    required: false
  platforms:
    default: '["linux/amd64","linux/arm64"]'
    description: JSON array of target platforms
    required: false
outputs:
  manifest:
    description: Rendered manifest YAML
    value: ${{ steps.skaffold.outputs.manifest }}
runs:
  using: composite
  steps:
    - env:
        PLATFORMS: ${{ inputs.platforms }}
        PROFILE: ${{ inputs.profile }}
      id: skaffold
      run: |
        args=()
        if [ -n "$PROFILE" ]; then
          args+=(-p "$PROFILE")
        fi

        PLATFORM="$(echo '$PLATFORMS' | jq -r 'join(",")')"
        if [ -n "$PLATFORM" ]; then
          args+=(--platform="$PLATFORM")
        fi

        skaffold config set --global collect-metrics false
        skaffold build "${args[@]}"
        MANIFEST="$(skaffold render "${args[@]}")"
        {
          echo 'manifest<<EOF'
          echo "$MANIFEST"
          echo 'EOF'
        } >> "$GITHUB_OUTPUT"
      shell: bash
