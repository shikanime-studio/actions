name: Skaffold Integration
description: Run Skaffold build and render, optionally with a profile
inputs:
  profile:
    description: Optional Skaffold profile name
    required: false
  platforms:
    default: '["linux/amd64","linux/arm64"]'
    description: JSON array of target platforms
    required: false
outputs:
  manifest:
    description: Rendered manifest YAML
    value: ${{ steps.skaffold.outputs.manifest }}
runs:
  using: composite
  steps:
    - id: skaffold
      run: |
        SKAFFOLD_PLATFORM="$(echo '${{ inputs.platforms }}' | jq -r 'join(",")')"

        args=()
        if [ -n "${{ inputs.profile }}" ]; then
          args+=(-p "${{ inputs.profile }}")
        fi

        skaffold config set --global collect-metrics false
        if [ -n "$SKAFFOLD_PLATFORM" ]; then
          SKAFFOLD_PLATFORM="$SKAFFOLD_PLATFORM" skaffold build "${args[@]}"
          MANIFEST="$(SKAFFOLD_PLATFORM="$SKAFFOLD_PLATFORM" skaffold render "${args[@]}")"
        else
          skaffold build "${args[@]}"
          MANIFEST="$(skaffold render "${args[@]}")"
        fi
        {
          echo 'manifest<<EOF'
          echo "$MANIFEST"
          echo 'EOF'
        } >> "$GITHUB_OUTPUT"
      shell: bash
