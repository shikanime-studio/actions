name: Skaffold Integration
description: Run Skaffold build and render, optionally with a profile
inputs:
  profile:
    description: Optional Skaffold profile name
    required: false
  platforms:
    default: '["linux/amd64","linux/arm64"]'
    description: JSON array of target platforms
    required: false
outputs:
  manifest:
    description: Rendered manifest YAML
    value: ${{ steps.skaffold.outputs.manifest }}
runs:
  using: composite
  steps:
    - env:
        INPUT_PLATFORMS: ${{ inputs.platforms }}
      run: |
        SKAFFOLD_PLATFORM="$(printf '%s' "$INPUT_PLATFORMS" | jq -r 'join(",")')"
        echo "platform=$SKAFFOLD_PLATFORM" >> "$GITHUB_OUTPUT"
      shell: bash
    - env:
        SKAFFOLD_PLATFORM: ${{ steps.skaffold.outputs.platform }}
        SKAFFOLD_PROFILE: ${{ inputs.profile }}
      id: skaffold
      run: |
        skaffold config set --global collect-metrics false
        skaffold build "${args[@]}"
        MANIFEST="$(skaffold render "${args[@]}")"
        {
          echo 'manifest<<EOF'
          echo "$MANIFEST"
          echo 'EOF'
        } >> "$GITHUB_OUTPUT"
      shell: bash
