---
name: Setup direnv
description: Allow .envrc and export its environment to GitHub Actions
inputs:
  cache-key:
    default: ${{ hashFiles('./.envrc') }}
    description: Cache key suffix override (defaults to current env hash)
    required: false
  path:
    default: .
    description: Directory containing .envrc
    required: false
  registry:
    default: nixpkgs
    description: Nix registry to use
    required: false
outputs:
  env:
    description:
      JSON object of environment variables changed by direnv (unset -> null)
    value: ${{ steps.export.outputs.env }}
runs:
  using: composite
  steps:
    - uses: actions/cache@v5
      with:
        key: direnv-${{ runner.os }}-${{ inputs.cache-key }}
        path: |
          ${{ inputs.path }}/.direnv
          ~/.cache/direnv
        restore-keys: |
          direnv-${{ runner.os }}-
    - id: nix-direnv
      run: |
        DIRENV_CONFIG="$(mktemp -d)"
        NIX_DIRENV="$(nix build "$INPUT_REGISTRY#nix-direnv" --no-link --print-out-paths)"
        echo "source \"$NIX_DIRENV/share/nix-direnv/direnvrc\"" > "$DIRENV_CONFIG/direnvrc"
        echo "direnv_config=$DIRENV_CONFIG" >> "$GITHUB_OUTPUT"
      shell: bash
      env:
        INPUT_REGISTRY: ${{ inputs.registry }}
    - env:
        DIRENV_CONFIG: ${{ steps.nix-direnv.outputs.direnv_config }}
        INPUT_PATH: ${{ inputs.path }}
        INPUT_REGISTRY: ${{ inputs.registry }}
      run: nix run "$INPUT_REGISTRY#direnv" -- allow "$INPUT_PATH"
      shell: bash
    - id: export
      run: |
        ENV="$(cd "$INPUT_PATH" && nix run "$INPUT_REGISTRY#direnv" -- export json)"
        {
          echo 'env<<EOF'
          echo "$ENV"
          echo 'EOF'
        } >> "$GITHUB_OUTPUT"
      shell: bash
      env:
        DIRENV_WARN_TIMEOUT: "0"
        DIRENV_CONFIG: ${{ steps.nix-direnv.outputs.direnv_config }}
        INPUT_PATH: ${{ inputs.path }}
        INPUT_REGISTRY: ${{ inputs.registry }}
