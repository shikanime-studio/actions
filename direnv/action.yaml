name: Setup direnv
description: Allow .envrc and export its environment to GitHub Actions
inputs:
  path:
    default: .
    description: Directory containing .envrc
    required: false
  registry:
    default: nixpkgs
    description: Nix registry to use
    required: false
outputs:
  env:
    description: JSON object of environment variables changed by direnv (unset -> null)
    value: ${{ steps.export.outputs.env }}
runs:
  using: composite
  steps:
    - env:
        REGISTRY: ${{ inputs.registry }}
      run: nix run "$REGISTRY#direnv" -- allow .
      shell: bash
      working-directory: ${{ inputs.path }}
    - id: export
      env:
        REGISTRY: ${{ inputs.registry }}
      run: |
        {
          echo 'env<<EOF'
          nix run "$REGISTRY#direnv" -- export json
          echo 'EOF'
        } >> "$GITHUB_OUTPUT"
      shell: bash
      working-directory: ${{ inputs.path }}
